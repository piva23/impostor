<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Impostor Sorteio</title>

    <link rel="stylesheet" href="style.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="icon-192.png" />
  </head>

  <body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="app">
      <h1>IMPOSTOR GAME</h1>
      <p class="subtitle">Toque na tela</p>

      <div class="cardArea">
        <div id="card" class="card hidden">
          <div class="cardInner">
            <div class="cardFront">
              <div class="astronaut">
                <svg viewBox="0 0 120 120">
                  <ellipse cx="60" cy="70" rx="35" ry="40" />
                  <rect x="30" y="35" width="60" height="40" rx="20" />
                  <ellipse cx="60" cy="50" rx="20" ry="15" fill="#aeefff" />
                </svg>
              </div>

              <p>Toque para revelar</p>
            </div>

            <div class="cardBack">
              <div id="roleIcon" class="roleIcon"></div>
              <h2 id="roleName"></h2>

              <p class="timer">
                Memorize<br />
                <span id="count">3</span>s
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- música do jogo -->
    <audio id="music" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <!-- efeitos -->
    <audio id="flip">
      <source
        src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
      />
    </audio>

    <audio id="endSound">
      <source
        src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
      />
    </audio>

    <script>
      const roles = [
        { name: 'Impostor', icon: '🔪', color: '#ff1744' },
        { name: 'Inocente', icon: '🙂', color: '#00e676' },
        { name: 'Xerife', icon: '⭐', color: '#ffd600' },
        { name: 'Herói', icon: '🛡️', color: '#00e5ff' },
        { name: 'Palhaço', icon: '🤡', color: '#ff4081' },
        { name: 'Rastreador', icon: '🧭', color: '#ff9100' },
        { name: 'Falso Xerife', icon: '🎖️', color: '#ff5252' },
        { name: 'Médico', icon: '💉', color: '#40c4ff' },
        { name: 'Reportador', icon: '📢', color: '#b388ff' },
      ];

      let currentRole = null;
      let revealed = false;

      const card = document.getElementById('card');
      const roleIcon = document.getElementById('roleIcon');
      const roleName = document.getElementById('roleName');

      const flipSound = document.getElementById('flip');
      const endSound = document.getElementById('endSound');
      const music = document.getElementById('music');

      function handleTouch() {
        music.play().catch(() => {});

        if (card.classList.contains('hidden')) {
          const random = Math.floor(Math.random() * roles.length);
          currentRole = roles[random];

          card.classList.remove('hidden');
          revealed = false;

          return;
        }

        if (!revealed) {
          flipSound.play();

          card.classList.add('flip');

          roleIcon.innerText = currentRole.icon;
          roleName.innerText = currentRole.name;

          roleName.style.color = currentRole.color;
          card.style.borderColor = currentRole.color;

          revealed = true;

          let time = 3;
          document.getElementById('count').innerText = time;

          const timer = setInterval(() => {
            time--;
            document.getElementById('count').innerText = time;

            if (time <= 0) {
              clearInterval(timer);

              endSound.play();

              card.classList.remove('flip');
              card.classList.add('hidden');
            }
          }, 1000);
        }
      }

      document.body.addEventListener('click', handleTouch);
      document.body.addEventListener('touchstart', handleTouch);

      /* REGISTRO DO SERVICE WORKER (PWA) */

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js');
        });
      }
    </script>
  </body>
</html>
